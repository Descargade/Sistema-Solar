<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fondo espacial -->
  <rect width="100" height="100" fill="#05060a"/>

  <!-- Estrella pequeña -->
  <circle cx="20" cy="25" r="1.2" fill="#ffffff"/>
  <circle cx="75" cy="18" r="1" fill="#ffffff"/>
  <circle cx="80" cy="70" r="1.3" fill="#ffffff"/>
  <circle cx="30" cy="80" r="1" fill="#ffffff"/>

  <!-- Sol -->
  <circle cx="50" cy="50" r="14" fill="#ffcc33"/>

  <!-- Anillo tipo Saturno -->
  <ellipse cx="50" cy="50" rx="28" ry="10"
           fill="none" stroke="#aab2c0" stroke-width="2" opacity="0.8"/>

  <!-- Glow suave -->
  <circle cx="50" cy="50" r="18" fill="#ffcc33" opacity="0.15"/>

  <!-- Marca 2BleA -->
  <text x="50" y="92"
        font-size="10"
        text-anchor="middle"
        fill="white"
        opacity="0.7"
        font-family="Arial, sans-serif">
    2BleA
  </text>
</svg>
